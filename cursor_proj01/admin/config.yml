backend:
  name: git-gateway
  branch: main

locale: zh_Hant

media_folder: images/portfolio
public_folder: /images/portfolio
# Netlify 根目錄部署用絕對路徑；GitHub Pages 請改 portfolio.json 或手動 push

collections:
  - name: portfolio
    label: 作品集
    files:
      - name: list
        label: 作品列表
        file: content/portfolio.json
        fields:
          - label: 作品
            name: items
            widget: list
            summary: "{{fields.title}}"
            fields:
              - { label: 標題, name: title, widget: string }
              - { label: 說明, name: description, widget: text, required: false }
              - label: 標籤
                name: tags
                widget: list
                field: { label: 標籤, name: tag, widget: string }
                required: false
              - { label: 封面圖, name: image, widget: image }
              - { label: 專案連結, name: url, widget: string, required: false, hint: "可留空" }
              - { label: 精選, name: featured, widget: boolean, default: false }
              - { label: 排序（數字越小越前面）, name: order, widget: number, default: 0, value_type: int }
